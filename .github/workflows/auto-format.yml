name: "Linter Compasivo (Auto-Format)"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar formateador (Black)
        run: pip install black

      - name: Ejecutar Black en todo el código Python
        run: black .

      - name: Hacer commit automático si hubo cambios (Solo para ramas internas)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: " [KAIA] Formateo mágico de código (Linter Compasivo)"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          status_options: '--untracked-files=no'

      - name: Comprobar formato en forks
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::El código no está formateado. Como tu PR viene de un fork, KAIA no puede hacer commit automáticamente. Por favor, ejecuta 'pip install black' y 'black .' en tu repositorio local y haz commit de los cambios."
            exit 1
          fi
