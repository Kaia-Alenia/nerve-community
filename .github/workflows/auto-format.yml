name: "Linter Compasivo (Auto-Format)"

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - '**.py'

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar formateador (Black)
        run: pip install black

      - name: Ejecutar Black en todo el código Python
        run: black .

      - name: Hacer commit automático si hubo cambios (Solo para ramas internas)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: " [KAIA] Formateo mágico de código (Linter Compasivo)"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          status_options: '--untracked-files=no'

      - name: Comprobar formato en forks
        if: github.event.pull_request.head.repo.full_name != github.repository
        id: check_format
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "incorrecto=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Comentar en el PR si el formato es incorrecto
        if: failure() && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ⚠️ Linter Compasivo: Formateo requerido

            ¡Hola @${{ github.event.pull_request.user.login }}! Tu código necesita un pequeño ajuste de formato antes de poder hacer merge.

            Como tu PR viene desde un fork, no puedo corregirlo automáticamente. Pero es muy fácil de solucionar:

            **Ejecuta estos comandos en tu repositorio local:**
            \`\`\`bash
            pip install black
            black .
            git add -A
            git commit -m "style: format code with black"
            git push
            \`\`\`

            Una vez que hagas push, este check se volverá a ejecutar automáticamente. ¡Ánimo! 💪`
            });
