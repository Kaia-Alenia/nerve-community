name: Bienvenida a Nuevos Contribuidores

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Saludo al autor del PR
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            // Buscar todos los PRs del usuario en este repo (abiertos y cerrados)
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            const userPulls = pulls.filter(pr => pr.user.login === prAuthor);

            // Solo saludar si este es su primer PR
            if (userPulls.length === 1) {
              const comment = [
                `¡Hola @${prAuthor}! 👋`,
                ``,
                `¡Felicidades por abrir tu **primer Pull Request** en \`nerve-community\`! Estamos muy felices de tenerte aquí.`,
                ``,
                `Un mantenedor revisará tu código lo antes posible. Si te pedimos cambios, no te preocupes — es el flujo normal para aprender juntos.`,
                ``,
                `Si necesitas algo, comenta aquí mismo. ¡Mucho éxito!`,
              ].join('\n');

              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });

              await github.rest.issues.addLabels({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['primera-vez'],
              });
            }
