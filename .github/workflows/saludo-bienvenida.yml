name: Bienvenida a Nuevos Contribuidores

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Saludo al autor del PR
        uses: actions/github-script@v6
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            
            // Verificar si el usuario ya ha hecho PRs antes en este repo
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: prAuthor,
            });
            
            // Filtrar solo los que son Pull Requests (la API devuelve issues y PRs juntos)
            const userPulls = issues.filter(issue => issue.pull_request);
            
            if (userPulls.length === 1) {
              const comment = `¡Hola @${prAuthor}! \n\n¡Felicidades por abrir tu **primer Pull Request** en \`nerve-community\`!  Estamos muy felices de tenerte aquí.\n\nUn mantenedor (alguien del equipo) revisará tu código lo antes posible. Si te pedimos algunos cambios, ¡no te preocupes! Es el flujo normal para aprender y mejorar juntos.\n\nSi necesitas algo, no dudes en comentar aquí mismo. ¡Mucho éxito! `;
              
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              
              await github.rest.issues.addLabels({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['primera-vez']
              });
            }
